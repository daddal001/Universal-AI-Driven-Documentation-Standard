# Universal AI-Driven Documentation Standard — Vale Configuration
# https://vale.sh/docs/vale-ini
#
# Install:  brew install vale (macOS) / choco install vale (Windows)
# Sync:     vale sync
# Lint:     vale .

StylesPath = styles
MinAlertLevel = suggestion

# Style packages (downloaded via `vale sync`)
#   Google       — Google Developer Documentation Style Guide (primary)
#   write-good   — clear, concise writing (passive voice, weasel words)
#   proselint    — grammar, redundancy, jargon, cliches
#   alex         — inclusive and considerate language
#   Readability  — reading level metrics (Flesch-Kincaid, Gunning Fog)
Packages = Google, write-good, proselint, alex, Readability

# Project-specific vocabulary (brand names, acronyms, jargon)
# See styles/config/vocabularies/Base/accept.txt
Vocab = Base

# -------------------------------------------------------------------
# Markdown files
# -------------------------------------------------------------------
[*.md]
BasedOnStyles = Vale, Google, write-good, proselint, alex, Readability

# Google — disable overly aggressive or context-dependent rules
Google.Latin = NO
Google.We = NO
Google.Will = NO

# write-good — disable rules that produce excessive noise
write-good.E-Prime = NO
write-good.TooWordy = NO
write-good.So = NO

# Readability — keep as suggestions only
Readability.FleschKincaid = suggestion
Readability.GunningFog = suggestion
Readability.LIX = suggestion
Readability.SMOG = suggestion
Readability.ColemanLiau = suggestion
Readability.AutomatedReadability = suggestion

# -------------------------------------------------------------------
# Plain text files
# -------------------------------------------------------------------
[*.txt]
BasedOnStyles = Vale, write-good, proselint
