#!/bin/bash
# doc-enforcement.conf — Shared configuration for documentation enforcement
#
# Sourced by:
#   - scripts/git-hooks/pre-commit          (local pre-commit hook)
#   - scripts/git-hooks/post-commit-audit   (bypass audit trail)
#   - .github/workflows/documentation-check.yml (CI workflow)
#
# Contains ONLY data (arrays, variables). No logic.
# WARNING: Changes here affect both local hooks and CI.

# ── Enforcement mode ─────────────────────────────────────────────
# "enforce" = exit 1 on failure (blocks commit / fails CI)
# "warn"    = exit 0 with yellow warning (advisory only, for staged rollout)
DOC_ENFORCEMENT_MODE="enforce"

# ── Source code file patterns (trigger doc requirement) ──────────
SOURCE_PATTERNS=(
  '\.tsx?$'     # TypeScript / TSX
  '\.jsx?$'     # JavaScript / JSX
  '\.py$'       # Python
  '\.go$'       # Go
  '\.rs$'       # Rust
  '\.java$'     # Java
  '\.cpp$'      # C++
  '\.c$'        # C
  '\.h$'        # C / C++ headers
  '\.tf$'       # Terraform
  '\.hcl$'      # HCL (Packer, etc.)
  '\.sh$'       # Shell scripts
)

# ── Documentation file patterns ──────────────────────────────────
DOC_PATTERNS=(
  '\.md$'       # Markdown files
)

# ── Exempt file patterns (never trigger doc requirement) ─────────
EXEMPT_PATTERNS=(
  '\.json$'           # package.json, tsconfig.json, etc.
  '\.ya?ml$'          # YAML config files
  '\.toml$'           # TOML config files
  '\.lock$'           # Lock files
  '\.env'             # Environment files
  'Dockerfile$'       # Docker files
  '\.dockerignore$'   # Docker ignore
  '\.gitignore$'      # Git ignore
  '\.prettierrc'      # Prettier config
  '\.eslintrc'        # ESLint config
  '\.css$'            # Stylesheets
  '\.scss$'           # SASS
  '\.svg$'            # SVG images
  '\.png$'            # PNG images
  '\.jpg$'            # JPEG images
  '\.jpeg$'           # JPEG images
  '\.ico$'            # Icons
  '\.woff2?$'         # Web fonts
  '\.ttf$'            # TrueType fonts
  '\.eot$'            # Embedded OpenType fonts
  '\.map$'            # Source maps
)

# ── Test file patterns (source code but exempt from doc req) ─────
TEST_PATTERNS=(
  '/tests?/'              # Files under tests/ or test/ directory
  '_test\.py$'            # Python test files (pytest convention)
  '\.test\.[jt]sx?$'     # JS/TS test files (jest convention)
  '\.spec\.[jt]sx?$'     # JS/TS spec files (jest/vitest convention)
  'conftest\.py$'         # Pytest fixtures
  '__mocks__/'            # Jest mock directories
  '\.stories\.[jt]sx?$'  # Storybook stories
)

# ── Global documentation paths (fallback only) ──────────────────
# Doc files under these prefixes satisfy scopes that have NO README.md
# in their ancestry. Scopes with an existing README are NOT satisfied
# by global docs — they must update their own scoped .md file.
GLOBAL_DOC_PREFIXES=(
  'docs/'
)

# Root-level files that count as global documentation (fallback only)
GLOBAL_DOC_FILES=(
  'CHANGELOG.md'
)

# ── Meaningful diff threshold ────────────────────────────────────
# Doc changes must have at least this many non-whitespace lines
# added or modified to count. Prevents gaming via trivial edits.
MIN_DOC_DIFF_LINES=1
